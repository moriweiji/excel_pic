name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest -q

      - name: Build GUI exe (PyInstaller)
        run: uv run pyinstaller --onefile --windowed --name excel-pic-gui src/excel_pic/gui_entry.py

      - name: Generate SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/excel-pic-gui.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  excel-pic-gui.exe" | Out-File -Encoding ascii dist/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/excel-pic-gui.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
          prerelease: false
